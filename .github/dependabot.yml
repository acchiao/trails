version: 2
updates:
  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: daily
      time: "09:00"
      timezone: America/Los_Angeles
    commit-message:
      prefix: build
      include: scope
    open-pull-requests-limit: 20

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
      time: "09:00"
      timezone: America/Los_Angeles
    commit-message:
      prefix: build
      include: scope
    open-pull-requests-limit: 20

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: "09:00"
      timezone: America/Los_Angeles
    commit-message:
      prefix: build
      include: scope
    open-pull-requests-limit: 20
